services:
  flux-capacitor:
    build: .
    image: flux-capacitor:latest
    container_name: flux-capacitor
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - API_DEFAULT_KEY=${API_DEFAULT_KEY:-change-me-flux-capacitor-key}
      - DATABASE_URL=sqlite+aiosqlite:///./data/flux_capacitor.db
      - DATABASE_SYNC_URL=sqlite:///./data/flux_capacitor.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
